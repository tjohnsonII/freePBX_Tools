{% extends "base.html" %}
{% block title %}Sign In – LSBBW{% endblock %}

{% block content %}
<div class="auth-box">
  <h2>Sign In</h2>

  {% if error %}
  <div class="alert error">{{ error }}</div>
  {% endif %}

  <form method="post" class="auth-form">
    <label>
      Email
      <input type="email" name="email" required autofocus placeholder="you@example.com">
    </label>
    <label>
      Password
      <input type="password" name="password" required placeholder="••••••••">
    </label>
    <button type="submit" class="btn-big" style="width:100%">Sign In</button>
  </form>

  <p class="auth-footer">No account? <a href="/account/signup">Join free</a></p>
</div>
{% endblock %}
