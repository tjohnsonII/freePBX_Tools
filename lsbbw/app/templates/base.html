<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}LSBBW{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">LS<span>BBW</span></a>
    <nav>
      <a href="/">Home</a>
      <a href="/submit" class="btn-submit">+ Submit</a>
    </nav>
  </div>
  <div class="cat-bar">
    {% set cats = ["General","Music Videos","Freestyles","Thick Thursdays","Fan Favorites","Comedy","Other"] %}
    <a href="/" class="cat{% if not active_cat %} active{% endif %}">All</a>
    {% for c in cats %}
    <a href="/?category={{ c | urlencode }}" class="cat{% if active_cat == c %} active{% endif %}">{{ c }}</a>
    {% endfor %}
  </div>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  <p>&copy; 2026 LSBBW &mdash; All rights reserved. 18+ only.</p>
</footer>

</body>
</html>
