<VirtualHost *:80>
    ServerName lsbbw.123hostedtools.com
    ServerAlias lsbbw.timsablab.ddns.net lsbbw.ddns.net

    ProxyPreserveHost On
    ProxyPass        /static/ !
    Alias /static/ /var/www/lsbbw/app/static/

    <Directory /var/www/lsbbw/app/static>
        Options -Indexes
        AllowOverride None
        Require all granted
        Header set Cache-Control "max-age=86400, public"
    </Directory>

    ProxyPass        / http://127.0.0.1:8420/
    ProxyPassReverse / http://127.0.0.1:8420/

    # Large uploads
    LimitRequestBody 524288000

    ErrorLog  ${APACHE_LOG_DIR}/lsbbw-error.log
    CustomLog ${APACHE_LOG_DIR}/lsbbw-access.log combined
</VirtualHost>
