<IfModule mod_ssl.c>

<VirtualHost *:443>

    ServerName auth.123hostedtools.com


    SSLEngine on

    SSLCertificateFile /etc/letsencrypt/live/auth.123hostedtools.com/fullchain.pem

    SSLCertificateKeyFile /etc/letsencrypt/live/auth.123hostedtools.com/privkey.pem


    ProxyRequests Off

    ProxyPreserveHost On

    ProxyAddHeaders On

    AllowEncodedSlashes NoDecode
    
    SSLProxyEngine On

    RequestHeader unset Forwarded

    RequestHeader set X-Forwarded-Proto "https"

    RequestHeader set X-Forwarded-Port "443"

    RequestHeader set X-Forwarded-Host "auth.123hostedtools.com"

    RequestHeader set X-Forwarded-Server "auth.123hostedtools.com"


    ProxyPass / http://192.168.30.104:8080/ nocanon

    ProxyPassReverse / http://192.168.30.104:8080/


    ErrorLog ${APACHE_LOG_DIR}/auth-error.log

    CustomLog ${APACHE_LOG_DIR}/auth-access.log combined

</VirtualHost>

</IfModule>
