<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName tools.123hostedtools.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/tools.123hostedtools.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/tools.123hostedtools.com/privkey.pem

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:4180/
    ProxyPassReverse / http://127.0.0.1:4180/

    ErrorLog ${APACHE_LOG_DIR}/tools-error.log
    CustomLog ${APACHE_LOG_DIR}/tools-access.log combined
</VirtualHost>
</IfModule>
