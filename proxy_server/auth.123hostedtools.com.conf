<VirtualHost *:80>

    ServerName auth.123hostedtools.com


    ProxyPreserveHost On

    RequestHeader set X-Forwarded-Proto "http"

    RequestHeader set X-Forwarded-Port "80"


    ProxyPass / http://192.168.30.104:8080/

    ProxyPassReverse / http://192.168.30.104:8080/


    ErrorLog ${APACHE_LOG_DIR}/auth-error.log

    CustomLog ${APACHE_LOG_DIR}/auth-access.log combined

RewriteEngine on
RewriteCond %{SERVER_NAME} =auth.123hostedtools.com
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
