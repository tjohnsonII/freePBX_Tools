<VirtualHost *:80>
    ServerName mail.timsablab.ddns.net

    RewriteEngine On
    RewriteRule ^/$ /mail/ [R=302,L]

    ProxyPreserveHost On
    SSLProxyEngine On
    SSLProxyVerify none
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off
    SSLProxyCheckPeerExpire off

    ProxyPass /mail/ https://192.168.30.103/mail/
    ProxyPassReverse /mail/ https://192.168.30.103/mail/

    ProxyPass /iredadmin/ https://192.168.30.103/iredadmin/
    ProxyPassReverse /iredadmin/ https://192.168.30.103/iredadmin/

    ErrorLog ${APACHE_LOG_DIR}/mail_error.log
    CustomLog ${APACHE_LOG_DIR}/mail_access.log combined
RewriteCond %{SERVER_NAME} =mail.timsablab.ddns.net
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
