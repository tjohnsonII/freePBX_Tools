Listen 8081

<VirtualHost 127.0.0.1:8081>
    ServerName tools-internal.local
    DocumentRoot /var/www/tools

    <Directory /var/www/tools>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/tools-internal-error.log
    CustomLog ${APACHE_LOG_DIR}/tools-internal-access.log combined
</VirtualHost>
