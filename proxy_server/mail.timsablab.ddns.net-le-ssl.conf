<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName mail.timsablab.ddns.net

    RedirectMatch 302 ^/$ /mail/

    ProxyPreserveHost On
    SSLProxyEngine On

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-Host "mail.timsablab.ddns.net"

    SSLProxyVerify none
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off
    SSLProxyCheckPeerExpire off

    ProxyPass        /mail/      https://192.168.30.103/mail/
    ProxyPassReverse /mail/      https://192.168.30.103/mail/

    ProxyPass        /iredadmin/ https://192.168.30.103/iredadmin/
    ProxyPassReverse /iredadmin/ https://192.168.30.103/iredadmin/

    ErrorLog ${APACHE_LOG_DIR}/mail_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/mail_ssl_access.log combined

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/mail.timsablab.ddns.net/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/mail.timsablab.ddns.net/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
