<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName grafana.123hostedtools.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/grafana.123hostedtools.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/grafana.123hostedtools.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyAddHeaders On
    SSLProxyEngine On

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-Host "grafana.123hostedtools.com"

    ProxyPass / http://192.168.99.187:3000/
    ProxyPassReverse / http://192.168.99.187:3000/

    ErrorLog ${APACHE_LOG_DIR}/grafana-error.log
    CustomLog ${APACHE_LOG_DIR}/grafana-access.log combined
</VirtualHost>
</IfModule>
