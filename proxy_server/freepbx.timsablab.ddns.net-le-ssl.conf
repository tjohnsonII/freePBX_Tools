<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName freepbx.timsablab.ddns.net

    ProxyPreserveHost On
    SSLProxyEngine On

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-Host "freepbx.timsablab.ddns.net"

    SSLProxyVerify none
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off
    SSLProxyCheckPeerExpire off
    
    <Location />
        Require ip 192.168.99.0/24
        Require ip 10.0.30.0/24
        Require ip 192.168.100.0/24
	Require ip 172.31.255.0/30
    </Location>
    
    Header always set Content-Security-Policy "upgrade-insecure-requests"
    Header always set X-Frame-Options SAMEORIGIN
    Header always set X-Content-Type-Options nosniff
    Header always set X-XSS-Protection "1; mode=block"    


    ProxyPass / https://192.168.142.42/
    ProxyPassReverse / https://192.168.142.42/

    ErrorLog ${APACHE_LOG_DIR}/freepbx_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/freepbx_ssl_access.log combined

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/freepbx.timsablab.ddns.net/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/freepbx.timsablab.ddns.net/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
