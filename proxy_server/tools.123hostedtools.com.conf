<VirtualHost *:80>

    ServerName tools.123hostedtools.com

    DocumentRoot /var/www/tools


    <Directory /var/www/tools>

        Options Indexes FollowSymLinks

        AllowOverride All

        Require all granted

    </Directory>


    ErrorLog ${APACHE_LOG_DIR}/tools-error.log

    CustomLog ${APACHE_LOG_DIR}/tools-access.log combined


    RewriteEngine On

    RewriteCond %{SERVER_NAME} =tools.123hostedtools.com

    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]

</VirtualHost>
