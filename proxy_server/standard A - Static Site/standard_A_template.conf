<# Apache SSL virtual host for a static site template>
<IfModule mod_ssl.c>
<VirtualHost *:443>
    # Primary hostname for this site (update per deployment)
    ServerName app.example.com
    # Optional additional hostnames that should serve the same site
    ServerAlias www.app.example.com

    # Filesystem path to the site root that will be served over HTTPS
    DocumentRoot /var/www/123hostedtools.com/public

    # Directory access rules for the document root
    <Directory /var/www/123hostedtools.com/public>
        # Allow Apache to follow symlinks inside this directory
        Options FollowSymLinks
        # Disable .htaccess overrides for predictable config
        AllowOverride None
        # Grant HTTP access to all clients
        Require all granted
    </Directory>

    # Default index files Apache will look for in a directory
    DirectoryIndex index.html index.htm

    # Per‑site error and access logs (rotate via global log config)
    ErrorLog ${APACHE_LOG_DIR}/123hostedtools-error.log
    ErrorLog ${APACHE_LOG_DIR}/123hostedtools-error.log
    CustomLog ${APACHE_LOG_DIR}/123hostedtools-access.log combined

    # Enable TLS/SSL for this virtual host
    SSLEngine on
    # Public certificate chain and private key for this hostname
    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/123hostedtools.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/123hostedtools.com/privkey.pem
    # Recommended SSL settings from certbot/Let’s Encrypt
    


    # Basic security headers to harden the site
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</VirtualHost>
</IfModule>