<# HTTP virtual host that redirects all traffic to HTTPS>
<VirtualHost *:80>
    # Primary hostname served on HTTP (update per deployment)
    ServerName 123hostedtools.com
    # Additional hostnames that should also redirect to HTTPS
    ServerAlias www.123hostedtools.com

    DocumentRoot /var/www/123hostedtools.com/public
    <Directory /var/www/123hostedtools.com/public>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>
    

    ErrorLog ${APACHE_LOG_DIR}/123hostedtools-error.log

    CustomLog ${APACHE_LOG_DIR}/123hostedtools-access.log combined
    # Enable mod_rewrite for redirect logic
    RewriteEngine On
    # Only apply redirect if the current request is not already HTTPS
    RewriteCond %{SERVER_NAME} =123hostedtools.com [OR]
    RewriteCond %{SERVER_NAME} =www.123hostedtools.com
    # Permanently redirect all requests to the HTTPS URL, preserving host and path
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>